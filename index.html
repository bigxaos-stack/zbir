<style>
*{box-sizing:border-box}
html,body{

  overflow:hidden;
  background:#000;

}

.page{

  height:100vh;

  inset:0;
  width:100%;
  height:100%;

  user-select:none;
  -webkit-user-drag:none;
}
.hotspot{
  position:absolute;
  border:0;
  padding:0;
  margin:0;
  background:transparent;
  cursor:pointer;
  border-radius:8px;
  -webkit-tap-highlight-color:rgba(0,0,0,.18);
}
.hotspot:active{background:rgba(0,0,0,.12);transform:scale(.99)}
.hotspot:focus-visible{
  outline:3px solid #111;
  outline-offset:2px;
  background:rgba(255,255,255,.15);
}
.toast{
  position:fixed;
  left:50%;
  bottom:calc(18px + env(safe-area-inset-bottom));
  transform:translate(-50%,18px);
  z-index:100;
  max-width:calc(100vw - 32px);
  padding:12px 18px;
  border-radius:999px;
  color:#fff;
  background:rgba(0,0,0,.88);
  font-size:15px;
  font-weight:700;
  opacity:0;
  pointer-events:none;
  transition:.2s ease;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>

<script>
const toast=document.getElementById('toast');let timer;
function showToast(m){clearTimeout(timer);toast.textContent=m;toast.classList.add('show');timer=setTimeout(()=>toast.classList.remove('show'),1700)}
async function copyText(t){try{await navigator.clipboard.writeText(t)}catch{const a=document.createElement('textarea');a.value=t;a.style.position='fixed';a.style.opacity='0';document.body.appendChild(a);a.select();document.execCommand('copy');a.remove()}showToast('Скопійовано')}
document.querySelectorAll('[data-copy]').forEach(b=>b.addEventListener('click',()=>copyText(b.dataset.copy)));
const shareText='Збір на шини для військових. Ціль — 30 000 грн. Картка: 4149 5110 2819 7408';
const pageUrl=location.protocol==='file:'?'':location.href;
document.querySelectorAll('.share').forEach(b=>b.addEventListener('click',async()=>{const t=encodeURIComponent(shareText),u=encodeURIComponent(pageUrl),n=b.dataset.network;
if(n==='telegram')location.href=`https://t.me/share/url?url=${u}&text=${t}`;
if(n==='viber')location.href=`viber://forward?text=${t}%20${u}`;
if(n==='whatsapp')location.href=`https://wa.me/?text=${t}%20${u}`;
if(n==='facebook'){if(pageUrl)location.href=`https://www.facebook.com/sharer/sharer.php?u=${u}`;else if(navigator.share)await navigator.share({title:document.title,text:shareText});else{await copyText(shareText);showToast('Текст для поширення скопійовано')}}
}));
</script>
