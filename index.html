<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Збір на шини для військових</title>
  <meta name="description" content="Збір на комплект автомобільних шин для службового автомобіля.">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    body { position: fixed; inset: 0; }

    .page {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }
    @supports (height: 100dvh) {
      .page { height: 100dvh; }
    }

    .poster {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      z-index: 5;
      border: 0;
      margin: 0;
      padding: 0;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(0,0,0,.16);
    }
    .hotspot:active { background: rgba(0,0,0,.12); }
    .hotspot:focus-visible {
      outline: 3px solid #111;
      outline-offset: 2px;
      background: rgba(255,255,255,.14);
    }

    .toast {
      position: fixed;
      z-index: 100;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      transform: translate(-50%, 16px);
      max-width: calc(100vw - 32px);
      padding: 11px 17px;
      border-radius: 999px;
      background: rgba(0,0,0,.9);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }
  </style>
</head>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast(message) {
      clearTimeout(toastTimer);
      toast.textContent = message;
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const area = document.createElement('textarea');
        area.value = text;
        area.style.position = 'fixed';
        area.style.opacity = '0';
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        area.remove();
      }
      showToast('Скопійовано');
    }

    document.querySelectorAll('[data-copy]').forEach((button) => {
      button.addEventListener('click', () => copyText(button.dataset.copy));
    });

    const shareText = 'Збір на шини для військових. Ціль — 30 000 грн. Картка: 4149 5110 2819 7408';

    document.querySelectorAll('[data-network]').forEach((button) => {
      button.addEventListener('click', async () => {
        const pageUrl = location.protocol === 'file:' ? '' : location.href;
        const text = encodeURIComponent(shareText);
        const url = encodeURIComponent(pageUrl);
        const network = button.dataset.network;

        if (network === 'telegram') {
          location.href = `https://t.me/share/url?url=${url}&text=${text}`;
        } else if (network === 'viber') {
          location.href = `viber://forward?text=${text}%20${url}`;
        } else if (network === 'whatsapp') {
          location.href = `https://wa.me/?text=${text}%20${url}`;
        } else if (network === 'facebook') {
          if (pageUrl) {
            location.href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
          } else if (navigator.share) {
            await navigator.share({ title: document.title, text: shareText });
          } else {
            await copyText(shareText);
          }
        }
      });
    });
  </script>
